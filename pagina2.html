<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Eventos</title>
    <link rel="stylesheet" href="styles1.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <div class="badge">Evento Especial</div>
        <h1>Fundamentos<br />de Diseño</h1>
        <p class="description">
          Una semana intensiva para dominar los principios del diseño. ¡Aprende,
          crea y diviertete!
        </p>
        <div class="info-row">
          <div class="info-item">
            <span>Fecha</span>
            <strong>24 Marzo</strong>
          </div>
          <div class="info-item">
            <span>Lugar</span>
            <strong>Aula Magna</strong>
          </div>
          <div class="info-item">
            <span>Cupos</span>
            <strong>50</strong>
          </div>
        </div>
        <h3>Completa</h3>
        <form class="form-box">
          <label><span>Nombres:</span><input type="text" /></label>
          <label><span>Facultad:</span><input type="text" /></label>
          <label><span>Cuotas:</span><input type="text" /></label>
          <label><span>Codigo:</span><input type="text" /></label>
        </form>
        <img
          class="promo-image"
          src="https://img.freepik.com/foto-gratis/groupo-cuatro-amigos-adolescentes-pasando-rato-escuela-secundaria_662251-1992.jpg?semt=ais_hybrid&w=740&q=80"
          alt="estudiantes"
        />
        <button>Inscribirme!</button>
      </article>
    </main>
    <footer>
      <p>Copyright © 2024</p>
    </footer>
  </body>
</html>
